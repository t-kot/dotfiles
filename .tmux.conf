set -g default-terminal "tmux-256color"
# Enable truecolor if terminal supports it
set -as terminal-features 'xterm-256color:RGB'
set -as terminal-features 'tmux-256color:RGB'

# Use the user's default shell; avoid legacy macOS reattach wrapper
# set-option -g default-command "reattach-to-user-namespace -l zsh"
set-window-option -g mode-keys vi
set -s escape-time 0
set -g focus-events on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-interval 5

#keybind
set-option -g prefix C-s
unbind -T prefix C-b
bind-key -T prefix s send-prefix
bind-key -T prefix z suspend-client
bind-key -T prefix C-k kill-pane
bind-key -T prefix C-j split-window -v -c "#{pane_current_path}"
bind-key -T prefix C-l split-window -h -c "#{pane_current_path}"
# Custom: prefix + c for new window
unbind -T prefix c
bind-key -T prefix c new-window
bind-key -T prefix h select-pane -L
bind-key -T prefix j select-pane -D
bind-key -T prefix k select-pane -U
bind-key -T prefix l select-pane -R

bind-key -T prefix r source-file ~/.tmux.conf \; display "Reloaded!"

# Enable modern mouse support
set -g mouse on

# Drop legacy alternate screen override
# set -g terminal-overrides 'xterm*:smcup@:rmcup@'
# Modern macOS clipboard integration in copy-mode-vi
set -g set-clipboard on
set -g allow-passthrough on
unbind -T copy-mode-vi y
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'

# Mouse drag: keep selection without copying (explicit 'y' to copy)
unbind -T copy-mode-vi MouseDragEnd1Pane

# TPM - Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
run '~/.tmux/plugins/tpm/tpm'

